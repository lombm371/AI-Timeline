<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="fonts/fontface_LilGrotesk.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Scroll</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #ffffff;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      font-family: "LilGrotesk-Regular", sans-serif;
    }

    #track {
      overflow: hidden;
      width: 100%;
      padding: 8px 0 16px;
    }

    #rail {
      display: flex;
      gap: 16px;
      align-items: center;
      width: max-content;
      padding: 0 24px;
      transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }

    .cam-card {
      flex-shrink: 0;
      border-radius: 0;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .cam-card:hover { border-color: #444; }
    .cam-card video, .cam-card img { display: block; }

    .card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
      padding: 20px 8px 6px;
      font-family: 'LilGrotesk-Regular', sans-serif;
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-date {
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      margin-top: 2px;
    }

    .no-feed {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #444;
      font-size: 12px;
      font-family: 'LilGrotesk-Regular', sans-serif;
    }

    #pip {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 260px;
      height: 195px;
      overflow: hidden;
      border: 2px solid #333;
      background: #000;
      z-index: 999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    #pip video { width: 100%; height: 100%; object-fit: cover; }

    #pip-close {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 16px;
      color: #fff;
      cursor: pointer;
      line-height: 1;
    }

    #upload-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 120px;
      height: 120px;
      object-fit: cover;
      cursor: pointer;
      z-index: 999;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    #upload-btn:hover {
      transform: scale(1.08);
      filter: brightness(1.2);
    }

    #file-input { display: none; }

    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.open { display: flex; }

    #modal {
      position: relative;
      width: 420px;
      height: 420px;
      font-family: "LilGrotesk-Regular", sans-serif;
      color: #fff;
      background: none;
      border: none;
      padding: 0;
      margin: auto;
    }

    #modal-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      z-index: 0;
      pointer-events: none;
    }

    #modal-inner {
      position: relative;
      z-index: 1;
      padding: 100px 80px 60px 80px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #modal h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #fff;
    }

    #modal label {
      display: block;
      font-size: 11px;
      color: #000000;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #modal input {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 7px 10px;
      font-size: 13px;
      font-family: 'LilGrotesk-Regular', sans-serif;
      margin-bottom: 10px;
      outline: none;
    }

    #modal input:focus { border-color: rgba(255,255,255,0.5); }

    #modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    #modal-cancel {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: #aaa;
      padding: 7px 16px;
      font-size: 12px;
      font-family: 'LilGrotesk-Regular', sans-serif;
      cursor: pointer;
    }

    #modal-cancel:hover { border-color: #fff; color: #fff; }

    #modal-confirm {
      background: #fff;
      border: none;
      color: #000;
      padding: 7px 16px;
      font-size: 12px;
      font-family: 'LilGrotesk-Regular', sans-serif;
      cursor: pointer;
      font-weight: 600;
    }

    #modal-confirm:hover { background: #ddd; }

    #loading {
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'LilGrotesk-Regular', sans-serif;
      color: #444;
      font-size: 13px;
      z-index: 2000;
    }
    #about-btn {
  position: fixed;
  top: 16px;
  left: 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  color: #000000;
  padding: 8px 18px;
  font-size: 12px;
  font-family: 'LilGrotesk-Regular', sans-serif;
  cursor: pointer;
  z-index: 999;
  letter-spacing: 0.1em;
  transition: border-color 0.2s, color 0.2s;
}

#about-btn:hover { border-color: #fff; }

#about-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

#about-overlay.open { display: flex; }

#about-modal {
  position: relative;
  max-width: 480px;
  width: 90%;
  color: #fff;
  font-family: 'LilGrotesk-Regular', sans-serif;
  text-align: center;
  line-height: 1.8;
  font-size: 14px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

#about-close {
  position: absolute;
  top: -32px;
  right: 0;
  font-size: 18px;
  cursor: pointer;
  color: #aaa;
}

#about-close:hover { color: #fff; }
  </style>
</head>
<body>

  <div id="loading">Loading saved media...</div>

  <div id="track">
    <div id="rail"></div>
  </div>
<div id="about-overlay">
  <div id="about-modal">
    <div id="about-close" onclick="document.getElementById('about-overlay').classList.remove('open')">✕</div>

  </div>
</div>
  <div id="pip">
    <video id="pip-video" autoplay muted playsinline></video>
    <div id="pip-close" onclick="closePip()">✕</div>
  </div>
<button id="about-btn" onclick="window.location.href='about.html'">About</button>
  <img id="upload-btn" src="IMAGES/Swiss Cross  Mini Canvas - cream _ 30.png" onclick="document.getElementById('file-input').click()">
  <input type="file" id="file-input" accept="image/*,video/*" onchange="onFileSelected(event)" />

  <div id="modal-overlay">
    <div id="modal">
      <img id="modal-bg" src="IMAGES/broken-concrete-wall-with-cracks-and-peeling-texture-set-against-a-clear-white-background-broken-concrete-cement-wall-isolated-background-free-png.png">
      <div id="modal-inner">
        <h2>Add Media</h2>
        <label>Title (optional)</label>
        <input type="text" id="modal-title" placeholder="e.g. Beach Trip" />
        <label>Date Found</label>
        <input type="date" id="modal-date" />
        <div id="modal-buttons">
          <button id="modal-cancel" onclick="closeModal()">Cancel</button>
          <button id="modal-confirm" onclick="confirmMedia()">Add</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const NUM_CAMS = 15;
    const CAM_W = 360;
    const CAM_H = 270;
    const MAX_W = 400;
    const MAX_H = 350;

    const rail = document.getElementById('rail');
    const track = document.getElementById('track');
    const pip = document.getElementById('pip');
    const pipVideo = document.getElementById('pip-video');
    const modalOverlay = document.getElementById('modal-overlay');
    const loadingScreen = document.getElementById('loading');

    let offset = 0;
    let activePip = null;
    let sharedStream = null;
    let pendingFile = null;
    let mediaItems = [];
    let db;

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('CameraScrollDB', 1);
        req.onupgradeneeded = (e) => {
          const d = e.target.result;
          if (!d.objectStoreNames.contains('media')) {
            d.createObjectStore('media', { keyPath: 'id', autoIncrement: true });
          }
        };
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror = reject;
      });
    }

    function saveItem(item) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction('media', 'readwrite');
        const store = tx.objectStore('media');
        const req = store.add({ type: item.type, title: item.title, date: item.date, blob: item.blob });
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror = reject;
      });
    }

    function loadAllItems() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction('media', 'readonly');
        const store = tx.objectStore('media');
        const req = store.getAll();
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror = reject;
      });
    }

    function getImageDimensions(url) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve({ w: img.naturalWidth, h: img.naturalHeight });
        img.src = url;
      });
    }

    function getVideoDimensions(url) {
      return new Promise((resolve) => {
        const video = document.createElement('video');
        video.onloadedmetadata = () => resolve({ w: video.videoWidth, h: video.videoHeight });
        video.src = url;
      });
    }

    function clampDimensions(w, h) {
      let scale = 1;
      if (w > MAX_W) scale = Math.min(scale, MAX_W / w);
      if (h > MAX_H) scale = Math.min(scale, MAX_H / h);
      return { w: Math.round(w * scale), h: Math.round(h * scale) };
    }

    function onFileSelected(event) {
      const file = event.target.files[0];
      if (!file) return;
      pendingFile = file;
      document.getElementById('modal-title').value = '';
      document.getElementById('modal-date').value = '';
      modalOverlay.classList.add('open');
      event.target.value = '';
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
      pendingFile = null;
    }

    async function confirmMedia() {
      if (!pendingFile) return;

      const title = document.getElementById('modal-title').value.trim();
      const dateVal = document.getElementById('modal-date').value;
      const type = pendingFile.type.startsWith('video') ? 'video' : 'image';
      const url = URL.createObjectURL(pendingFile);

      const raw = type === 'image' ? await getImageDimensions(url) : await getVideoDimensions(url);
      const dims = clampDimensions(raw.w, raw.h);

      const item = {
        type, title,
        date: dateVal || '9999-99-99',
        blob: pendingFile,
        w: dims.w,
        h: dims.h,
        url
      };

      const id = await saveItem(item);
      item.id = id;
      mediaItems.push(item);
      mediaItems.sort((a, b) => a.date.localeCompare(b.date));

      rebuildRail();
      closeModal();
    }

    function rebuildRail() {
      rail.innerHTML = '';
      if (mediaItems.length === 0) {
        for (let i = 0; i < NUM_CAMS; i++) rail.appendChild(buildCameraCard());
        return;
      }
      for (const item of mediaItems) {
        rail.appendChild(buildCameraCard());
        rail.appendChild(buildMediaCard(item));
      }
      rail.appendChild(buildCameraCard());
    }

    function buildMediaCard(item) {
      const card = document.createElement('div');
      card.className = 'cam-card';
      card.style.width = item.w + 'px';
      card.style.height = item.h + 'px';

      if (item.type === 'image') {
        const img = document.createElement('img');
        img.src = item.url;
        img.style.width = item.w + 'px';
        img.style.height = item.h + 'px';
        img.style.objectFit = 'contain';
        card.appendChild(img);
      } else {
        const video = document.createElement('video');
        video.src = item.url;
        video.autoplay = true;
        video.muted = true;
        video.loop = true;
        video.playsInline = true;
        video.style.width = item.w + 'px';
        video.style.height = item.h + 'px';
        video.style.objectFit = 'contain';
        card.appendChild(video);
      }

      if (item.title || item.date !== '9999-99-99') {
        const info = document.createElement('div');
        info.className = 'card-info';
        if (item.title) {
          const t = document.createElement('div');
          t.className = 'card-title';
          t.textContent = item.title;
          info.appendChild(t);
        }
        if (item.date !== '9999-99-99') {
          const d = document.createElement('div');
          d.className = 'card-date';
          d.textContent = new Date(item.date + 'T00:00:00').toLocaleDateString('en-US', {
            year: 'numeric', month: 'short', day: 'numeric'
          });
          info.appendChild(d);
        }
        card.appendChild(info);
      }

      return card;
    }

    function buildCameraCard() {
      const card = document.createElement('div');
      card.className = 'cam-card';
      card.style.width = CAM_W + 'px';
      card.style.height = CAM_H + 'px';

      if (sharedStream) {
        const video = document.createElement('video');
        video.autoplay = true;
        video.muted = true;
        video.playsInline = true;
        video.srcObject = sharedStream;
        video.style.width = '100%';
        video.style.height = '100%';
        video.style.objectFit = 'cover';
        card.appendChild(video);
      } else {
        const noFeed = document.createElement('div');
        noFeed.className = 'no-feed';
        noFeed.innerHTML = `
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M15 10l4.553-2.069A1 1 0 0121 8.88v6.24a1 1 0 01-1.447.89L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
            <line x1="3" y1="3" x2="21" y2="21"/>
          </svg>
          <span>camera blocked</span>
        `;
        card.appendChild(noFeed);
      }

      return card;
    }

    function maxOffset() {
      return Math.max(0, rail.scrollWidth - track.clientWidth);
    }

    function applyOffset() {
      offset = Math.max(0, Math.min(offset, maxOffset()));
      rail.style.transform = `translateX(-${offset}px)`;
    }

    window.addEventListener('wheel', (e) => {
      e.preventDefault();
      offset += e.deltaY * 0.8;
      applyOffset();
    }, { passive: false });

    let lastTouchY = 0;
    window.addEventListener('touchstart', (e) => { lastTouchY = e.touches[0].clientY; });
    window.addEventListener('touchmove', (e) => {
      const dy = lastTouchY - e.touches[0].clientY;
      lastTouchY = e.touches[0].clientY;
      offset += dy;
      applyOffset();
    });

    function closePip() {
      pip.style.display = 'none';
      pipVideo.srcObject = null;
      activePip = null;
    }

    function togglePip(idx) {
      if (activePip === idx) { closePip(); return; }
      if (sharedStream) {
        pipVideo.srcObject = sharedStream;
        pip.style.display = 'block';
        activePip = idx;
      }
    }

    async function init() {
      db = await openDB();
      const saved = await loadAllItems();
      for (const item of saved) {
        item.url = URL.createObjectURL(item.blob);
        if (!item.w || !item.h) {
          const raw = item.type === 'image'
            ? await getImageDimensions(item.url)
            : await getVideoDimensions(item.url);
          const dims = clampDimensions(raw.w, raw.h);
          item.w = dims.w;
          item.h = dims.h;
        }
        mediaItems.push(item);
      }
      mediaItems.sort((a, b) => a.date.localeCompare(b.date));

      try {
        sharedStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      } catch (e) {
        console.warn('Camera access denied:', e);
      }

      rebuildRail();
      loadingScreen.style.display = 'none';
    }

    init();
  </script>
</body>
</html>
