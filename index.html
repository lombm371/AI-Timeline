<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enter</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

   #enter-img {
  width: 30%;
  display: block;
  cursor: pointer;
  user-select: none;
  transition: transform 0.3s ease, filter 0.3s ease;
  animation: breathe 3s ease-in-out infinite;
  transform-origin: bottom center;
}

#enter-img:hover {
  transform: scale(1.0) translateY(-6px);
  filter: brightness(1.15);
  animation: none;
}
    

    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.8; }
    }
  </style>
</head>
<body>

  <img id="enter-img" src="images/original_38bc8edf404a1236393c8dc62f147556.png" onclick="enter()">

  <script>
    function enter() {
      window.location.href = 'AIGRID.html';
    }
  </script>

</body>
</html>
